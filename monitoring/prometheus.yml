global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: development
    project:     market-regime-detector

scrape_configs:

  - job_name: "fastapi-app"
    static_configs:
      - targets: ["app:8000"]
    metrics_path: /metrics
    scrape_interval: 15s

  - job_name: "prometheus-self"
    static_configs:
      - targets: ["localhost:9090"]