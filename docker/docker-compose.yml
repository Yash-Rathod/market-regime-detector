networks:
  regime-net:
    driver: bridge

volumes:
  postgres-data:
  mlflow-data:
  model-artifacts-seed:
    external: true

services:

  postgres:
    image: postgres:15
    container_name: market-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     regime
      POSTGRES_PASSWORD: regime123
      POSTGRES_DB:       market_data
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - regime-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regime -d market_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: market-mlflow
    restart: unless-stopped
    working_dir: /mlflow
    volumes:
      - mlflow-data:/mlflow
    ports:
      - "5001:5001"
    networks:
      - regime-net
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --default-artifact-root mlflow-artifacts:/
      --host 0.0.0.0
      --port 5001
      --serve-artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  trainer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.trainer
    container_name: market-trainer
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      DATABASE_URL:        postgresql://regime:regime123@postgres:5432/market_data
      MLFLOW_TRACKING_URI: http://mlflow:5001
      MODEL_NAME:          market_regime_classifier
      TICKERS:             ^NSEI,^NSEBANK,RELIANCE.NS,INFY.NS,HDFCBANK.NS
      ENVIRONMENT:         development
    volumes:
      - model-artifacts-seed:/app/mlartifacts
    networks:
      - regime-net
    profiles:
      - training

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    container_name: market-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:        postgresql://regime:regime123@postgres:5432/market_data
      MLFLOW_TRACKING_URI: http://mlflow:5001
      MODEL_PATH:          /app/mlartifacts/model.pkl
      ENCODER_PATH:        /app/mlartifacts/label_encoder.pkl
      MAPPING_PATH:        /app/mlartifacts/class_mapping.json
      APP_VERSION:         "0.1.0"
      ENVIRONMENT:         development
    volumes:
      - model-artifacts-seed:/app/mlartifacts
    ports:
      - "8000:8000"
    networks:
      - regime-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    container_name: market-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - regime-net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:latest
    container_name: market-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - regime-net
    depends_on:
      - prometheus